<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>University Club Registration</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h2>University Club Membership Registration</h2>

<form id="clubForm">

<label>First Name</label>
<input type="text" id="fname">

<label>Last Name</label>
<input type="text" id="lname">

<label>Email</label>
<input type="email" id="email">

<label>Password</label>
<input type="password" id="password">

<label>Gender</label><br>

<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other

<br><br>

<label>Interested Clubs</label><br>

<input type="checkbox" name="club" value="Programming"> Programming
<input type="checkbox" name="club" value="Sports"> Sports
<input type="checkbox" name="club" value="Music"> Music
<input type="checkbox" name="club" value="Photography"> Photography

<br><br>

<label>Club Category</label>

<select id="category">
    <option value="">Select Category</option>
    <option>Academic</option>
    <option>Sports</option>
    <option>Cultural</option>
</select>

<label>Why do you want to join?</label>

<textarea id="reason" rows="5"></textarea>

<br>

<input type="submit" value="Register">

</form>

<p id="message"></p>

</div>

<script src="script.js"></script>

</body>
</html>
